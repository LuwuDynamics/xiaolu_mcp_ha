name: Upload ZIP to Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate tag format
        run: |
          if [[ ! "$GITHUB_REF" =~ ^refs/tags/v[0-9]+\.[0-9]+\.[0-9]+.*$ ]]; then
            echo "Error: Tag must be in format v#.#.# (e.g., v1.0.0)"
            exit 1
          fi
          echo "Tag format is valid: $GITHUB_REF"

      - name: Update manifest version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          sed -i "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" custom_components/xiaolu_mcp_server/manifest.json
          echo "Updated manifest version to: $VERSION"
          cat custom_components/xiaolu_mcp_server/manifest.json

      - name: Create ZIP
        run: |
          cd custom_components/xiaolu_mcp_server
          zip -r ../../xiaolu_mcp_ha.zip . -x "__pycache__/*" "*.pyc"
          cd ../..
          ls -la xiaolu_mcp_ha.zip
          unzip -l xiaolu_mcp_ha.zip

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: xiaolu_mcp_ha.zip
